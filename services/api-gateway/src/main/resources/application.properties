server.port=8080
spring.application.name=api-gateway
jwt.secret=${JWT_SECRET:bXlTZWN1cmVTZWNyZXRLZXkxMjM0NTY3ODkwQUJDREU=}

# Ruta pública: autenticación
spring.cloud.gateway.mvc.routes[0].id=auth
spring.cloud.gateway.mvc.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

# Rutas protegidas
spring.cloud.gateway.mvc.routes[1].id=inventario
spring.cloud.gateway.mvc.routes[1].uri=http://ms-inventario:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/inventario/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.mvc.routes[2].id=pedidos
spring.cloud.gateway.mvc.routes[2].uri=http://ms-pedidos:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/pedidos/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.mvc.routes[3].id=envios
spring.cloud.gateway.mvc.routes[3].uri=http://ms-envios:8084
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/envios/**
spring.cloud.gateway.mvc.routes[3].filters[0]=StripPrefix=2

management.endpoints.web.exposure.include=health,info
