server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # SPA routing — todas las rutas que no sean archivos van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls al gateway (en Docker ambos están en la misma red)
    # Esto permite que el browser llame a /api/* y nginx lo reenvía al gateway.

    # Cache assets con hash (Vite genera nombres con hash para JS/CSS)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
